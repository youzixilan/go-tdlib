name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gperf openssl cmake

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gperf libssl-dev zlib1g-dev build-essential

      - name: Build TDLib
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git /tmp/td
          mkdir -p /tmp/td/build
          cd /tmp/td/build
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENSSL_ROOT=$(brew --prefix openssl@3)
          else
            OPENSSL_ROOT=/usr
          fi
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local/tdlib \
            ..
          cmake --build . --target tdjson -j4
          cmake --install . || true
          mkdir -p $HOME/.local/tdlib/include/td/telegram
          cp /tmp/td/td/telegram/td_json_client.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true
          cp /tmp/td/td/telegram/td_log.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true
          find /tmp/td/build -name "tdjson_export.h" -exec cp {} $HOME/.local/tdlib/include/td/telegram/ \; 2>/dev/null || true

      - name: Build tgctl
        run: |
          ln -sf $HOME/.local/tdlib ${{ github.workspace }}/tdlib
          CGO_CFLAGS="-I$HOME/.local/tdlib/include" \
          CGO_LDFLAGS="-L$HOME/.local/tdlib/lib -ltdjson" \
          CGO_ENABLED=1 \
          go build -ldflags="-w -s" -o tgctl-${{ matrix.suffix }} ./cmd/tgctl/

      - name: Package
        run: |
          mkdir -p dist
          cp tgctl-${{ matrix.suffix }} dist/
          cp $HOME/.local/tdlib/lib/libtdjson* dist/ 2>/dev/null || true
          cd dist && tar czf ../tgctl-${{ matrix.suffix }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: tgctl-${{ matrix.suffix }}
          path: tgctl-${{ matrix.suffix }}.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-gperf
            mingw-w64-x86_64-make
            git

      - name: Build TDLib
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git /c/td
          mkdir -p /c/td/build
          cd /c/td/build
          cmake -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/c/tdlib \
            ..
          cmake --build . --target tdjson -j4
          cmake --install . || true
          mkdir -p /c/tdlib/include/td/telegram
          cp /c/td/td/telegram/td_json_client.h /c/tdlib/include/td/telegram/ 2>/dev/null || true
          cp /c/td/td/telegram/td_log.h /c/tdlib/include/td/telegram/ 2>/dev/null || true
          find /c/td/build -name "tdjson_export.h" -exec cp {} /c/tdlib/include/td/telegram/ \; 2>/dev/null || true

      - name: Build tgctl
        shell: msys2 {0}
        run: |
          export PATH="/c/hostedtoolcache/windows/go/1.25.5/x64/bin:$PATH"
          cd $GITHUB_WORKSPACE
          mkdir -p tdlib
          cp -r /c/tdlib/* tdlib/
          CGO_CFLAGS="-I/c/tdlib/include" \
          CGO_LDFLAGS="-L/c/tdlib/lib -ltdjson" \
          CGO_ENABLED=1 \
          go build -ldflags="-w -s" -o tgctl-windows-amd64.exe ./cmd/tgctl/

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item tgctl-windows-amd64.exe dist\
          Get-ChildItem -Path C:\tdlib\bin -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName dist\ }
          Get-ChildItem -Path C:\tdlib\lib -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName dist\ }
          Compress-Archive -Path dist\* -DestinationPath tgctl-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: tgctl-windows-amd64
          path: tgctl-windows-amd64.zip

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
