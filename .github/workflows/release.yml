name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gperf openssl cmake

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gperf libssl-dev zlib1g-dev build-essential

      - name: Build TDLib
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git /tmp/td
          cd /tmp/td && mkdir build && cd build
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENSSL_ROOT=$(brew --prefix openssl@3)
          else
            OPENSSL_ROOT=/usr
          fi
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local/tdlib \
            ..
          cmake --build . --target tdjson -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cmake --install . || true
          # copy headers if missing
          mkdir -p $HOME/.local/tdlib/include/td/telegram
          cp /tmp/td/td/telegram/td_json_client.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true
          cp /tmp/td/td/telegram/td_log.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true
          cp /tmp/td/build/td/telegram/tdjson_export.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true

      - name: Build tgctl
        env:
          CGO_CFLAGS: -I${{ github.workspace }}/tdlib/include
          CGO_LDFLAGS: -L${{ github.workspace }}/tdlib/lib -ltdjson
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # symlink tdlib
          ln -sf $HOME/.local/tdlib ${{ github.workspace }}/tdlib
          CGO_CFLAGS="-I$HOME/.local/tdlib/include" \
          CGO_LDFLAGS="-L$HOME/.local/tdlib/lib -ltdjson" \
          CGO_ENABLED=1 \
          go build -ldflags="-w -s" -o tgctl-${{ matrix.suffix }} ./cmd/tgctl/

      - name: Package
        run: |
          mkdir -p dist
          cp tgctl-${{ matrix.suffix }} dist/
          cp $HOME/.local/tdlib/lib/libtdjson* dist/ 2>/dev/null || true
          cd dist && tar czf ../tgctl-${{ matrix.suffix }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: tgctl-${{ matrix.suffix }}
          path: tgctl-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
